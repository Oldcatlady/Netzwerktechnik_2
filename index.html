<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Netzwerktechnik_2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Netzwerktechnik_2</h1>

        <div class="progress-info">
            <span id="progressText"></span>
            <span id="scoreText"></span>
            <span id="percentText"></span>
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <div class="card">
            <h2 id="question"></h2>

            <div id="answers"></div>

            <!-- KORREKTUR: Standardmäßig ausgeblendet -->
            <input type="text" id="textAnswer" placeholder="Deine Antwort..." style="display: none;">

            <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
                Weiter
            </button>

            <div id="feedback"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
